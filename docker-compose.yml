version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: endow
      POSTGRES_PASSWORD: endow_dev_password
      POSTGRES_DB: endow_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  typesense:
    image: typesense/typesense:26.0
    ports:
      - '8108:8108'
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=endow_typesense_dev_key --enable-cors'

volumes:
  postgres_data:
  redis_data:
  typesense_data:
