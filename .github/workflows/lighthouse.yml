name: Lighthouse SEO Audit

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ secrets.PREVIEW_URL }}
            ${{ secrets.PREVIEW_URL }}/universities
          budgetPath: .lighthouserc.json
          uploadArtifacts: true
